name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v7
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      # Lockfile drift previously only surfaced as a failed Railway deploy (Railway
      # sets CI=true, which makes bun default to --frozen-lockfile). Validate every
      # bun.lock here so a human/agent commit that forgets to regenerate one fails CI.
      #
      # Dependabot bumps package.json without regenerating bun.lock, so a hard
      # frozen check would re-break every dependabot PR — see 37c79d8. For those PRs
      # the same check runs as a non-blocking warning instead of a gate, so the drift
      # is still visible in the logs without turning the PR red.
      - name: Validate bun lockfiles
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/')
        run: bash .github/scripts/check-lockfiles.sh

      - name: Validate bun lockfiles (dependabot, non-blocking)
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/')
        continue-on-error: true
        run: bash .github/scripts/check-lockfiles.sh

      - name: Install web dependencies
        run: cd web && bun install --no-save
      
      - name: Install API dependencies
        run: cd api && uv sync --extra dev
      
      - name: Lint
        run: bun run lint
        continue-on-error: true  # 153 pre-existing lint errors - TODO: fix separately
      
      - name: Type check
        run: bun run typecheck
      
      - name: Test API
        run: bun run test:api

      - name: Test web (unit)
        run: bun run test:web

      # E2E tests run separately via test:e2e
