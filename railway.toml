# Railway config for the dsa-api service.
#
# This service's Root Directory must be the repo ROOT (not api/), because the
# Flask app imports the repo-root `algorithms/` package at startup and a build
# from api/ can't see it. Railway reads the config file from the service's root
# directory, so this lives at the repo root and is read only by the service
# whose Root Directory is "/". dsa-web keeps Root Directory = web and reads
# web/railway.toml, so it is unaffected.
[build]
builder = "dockerfile"
dockerfilePath = "api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
